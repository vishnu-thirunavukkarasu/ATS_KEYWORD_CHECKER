<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATS Keyword Extractor</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --border: #2a2a3a;
    --accent: #7c6dfa;
    --accent2: #fa6d8e;
    --accent3: #6dfacc;
    --text: #e8e8f0;
    --text-muted: #6b6b85;
    --text-dim: #3a3a52;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--text-dim) 1px, transparent 1px),
      linear-gradient(90deg, var(--text-dim) 1px, transparent 1px);
    background-size: 48px 48px;
    opacity: 0.15;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 960px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }

  /* Header */
  header {
    margin-bottom: 48px;
    animation: fadeDown 0.6s ease both;
  }

  .eyebrow {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .eyebrow::before {
    content: '';
    display: block;
    width: 24px;
    height: 1px;
    background: var(--accent);
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(32px, 6vw, 56px);
    font-weight: 800;
    line-height: 1.05;
    letter-spacing: -0.02em;
  }

  h1 span {
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    margin-top: 12px;
    font-size: 13px;
    color: var(--text-muted);
    font-weight: 300;
  }

  /* Input Section */
  .input-section {
    animation: fadeUp 0.6s ease 0.1s both;
  }

  .input-label {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 10px;
    display: block;
  }

  textarea {
    width: 100%;
    min-height: 240px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 20px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 300;
    line-height: 1.7;
    resize: vertical;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  textarea::placeholder { color: var(--text-dim); }

  textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent), 0 0 20px rgba(124, 109, 250, 0.12);
  }

  .actions {
    display: flex;
    gap: 12px;
    margin-top: 16px;
    align-items: center;
  }

  .btn-primary {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 3px;
    padding: 14px 32px;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    position: relative;
    overflow: hidden;
  }

  .btn-primary::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .btn-primary:hover { background: #6a5de0; }
  .btn-primary:hover::after { opacity: 1; }
  .btn-primary:active { transform: scale(0.98); }
  .btn-primary:disabled { background: var(--border); color: var(--text-muted); cursor: not-allowed; transform: none; }

  .btn-clear {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    border-radius: 3px;
    padding: 14px 20px;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
  }
  .btn-clear:hover { border-color: var(--accent2); color: var(--accent2); }

  .char-count {
    margin-left: auto;
    font-size: 11px;
    color: var(--text-dim);
  }

  /* Loading */
  #loading {
    display: none;
    padding: 40px;
    text-align: center;
    color: var(--text-muted);
    font-size: 12px;
    letter-spacing: 0.1em;
  }

  .loader {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-bottom: 16px;
  }

  .loader-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 1.2s ease-in-out infinite;
  }
  .loader-dot:nth-child(2) { animation-delay: 0.2s; background: var(--accent2); }
  .loader-dot:nth-child(3) { animation-delay: 0.4s; background: var(--accent3); }

  /* Results */
  #results {
    display: none;
    margin-top: 40px;
    animation: fadeUp 0.5s ease both;
  }

  .results-header {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }

  .results-title {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 700;
  }

  .results-meta {
    font-size: 11px;
    color: var(--text-muted);
  }

  /* Category blocks */
  .categories {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
    margin-bottom: 32px;
  }

  .category-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 20px;
    transition: border-color 0.2s;
  }

  .category-block:hover { border-color: var(--text-dim); }

  .category-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 14px;
  }

  .category-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .category-name {
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .category-count {
    margin-left: auto;
    font-size: 10px;
    color: var(--text-muted);
    background: var(--surface2);
    padding: 2px 7px;
    border-radius: 99px;
  }

  .keyword-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .keyword-chip {
    font-size: 11px;
    font-weight: 400;
    padding: 4px 10px;
    border-radius: 2px;
    border: 1px solid transparent;
    cursor: default;
    transition: transform 0.15s;
    letter-spacing: 0.02em;
  }
  .keyword-chip:hover { transform: translateY(-1px); }

  /* Priority summary */
  .priority-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 24px;
    margin-bottom: 16px;
  }

  .priority-label {
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 14px;
  }

  .top-keywords {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .top-chip {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    background: var(--surface2);
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 6px 14px;
    border-radius: 2px;
    letter-spacing: 0.03em;
  }

  /* Copy btn */
  .copy-row {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    margin-top: 8px;
  }

  .btn-copy {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    border-radius: 3px;
    padding: 8px 16px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-copy:hover { border-color: var(--accent3); color: var(--accent3); }

  /* Error */
  #error {
    display: none;
    background: rgba(250, 109, 142, 0.08);
    border: 1px solid rgba(250, 109, 142, 0.3);
    border-radius: 4px;
    padding: 16px 20px;
    font-size: 12px;
    color: var(--accent2);
    margin-top: 16px;
  }

  /* Animations */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse {
    0%, 80%, 100% { transform: scale(0.7); opacity: 0.5; }
    40% { transform: scale(1); opacity: 1; }
  }

  /* Color palette for categories */
  .c0 { color: #7c6dfa; border-color: rgba(124,109,250,0.25); background: rgba(124,109,250,0.07); }
  .c0-dot { background: #7c6dfa; }
  .c1 { color: #fa6d8e; border-color: rgba(250,109,142,0.25); background: rgba(250,109,142,0.07); }
  .c1-dot { background: #fa6d8e; }
  .c2 { color: #6dfacc; border-color: rgba(109,250,204,0.25); background: rgba(109,250,204,0.07); }
  .c2-dot { background: #6dfacc; }
  .c3 { color: #fad96d; border-color: rgba(250,217,109,0.25); background: rgba(250,217,109,0.07); }
  .c3-dot { background: #fad96d; }
  .c4 { color: #6db8fa; border-color: rgba(109,184,250,0.25); background: rgba(109,184,250,0.07); }
  .c4-dot { background: #6db8fa; }
  .c5 { color: #fa9c6d; border-color: rgba(250,156,109,0.25); background: rgba(250,156,109,0.07); }
  .c5-dot { background: #fa9c6d; }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="eyebrow">Resume Toolkit</div>
    <h1>ATS <span>Keyword</span><br>Extractor</h1>
    <p class="subtitle">Paste a job description → get the keywords that matter to applicant tracking systems</p>
  </header>

  <div class="input-section">
    <label class="input-label" for="jd-input">Job Description</label>
    <textarea
      id="jd-input"
      placeholder="Paste the full job description here…&#10;&#10;E.g. We are looking for a Senior Software Engineer with 5+ years of experience in Python, AWS, and distributed systems. The ideal candidate will have expertise in microservices architecture, CI/CD pipelines, and Agile methodologies…"
    ></textarea>

    <div class="actions">
      <button class="btn-primary" id="extract-btn" onclick="extractKeywords()">Extract Keywords</button>
      <button class="btn-clear" onclick="clearAll()">Clear</button>
      <span class="char-count" id="char-count">0 chars</span>
    </div>
  </div>

  <div id="error"></div>

  <div id="loading">
    <div class="loader">
      <div class="loader-dot"></div>
      <div class="loader-dot"></div>
      <div class="loader-dot"></div>
    </div>
    Analyzing job description…
  </div>

  <div id="results">
    <div class="results-header">
      <div class="results-title">Extracted Keywords</div>
      <div class="results-meta" id="results-meta"></div>
    </div>

    <div class="priority-section">
      <div class="priority-label">★ Top Priority Keywords</div>
      <div class="top-keywords" id="top-keywords"></div>
    </div>

    <div class="categories" id="categories"></div>

    <div class="copy-row">
      <button class="btn-copy" onclick="copyAll()">Copy All Keywords</button>
      <button class="btn-copy" onclick="copyTop()">Copy Top Keywords</button>
    </div>
  </div>

</div>

<script>
const textarea = document.getElementById('jd-input');
textarea.addEventListener('input', () => {
  document.getElementById('char-count').textContent = textarea.value.length.toLocaleString() + ' chars';
});

let lastResult = null;

async function extractKeywords() {
  const jd = textarea.value.trim();
  if (!jd) { showError('Please paste a job description first.'); return; }
  if (jd.length < 50) { showError('Job description seems too short. Please paste the full text.'); return; }

  hideError();
  setLoading(true);
  document.getElementById('results').style.display = 'none';

  const prompt = `You are an expert ATS (Applicant Tracking System) analyst. Analyze the following job description and extract all important ATS keywords that a candidate should include in their resume.

Categorize them into these groups:
1. Technical Skills (hard skills, tools, technologies, software, languages, frameworks)
2. Soft Skills (interpersonal, behavioral, leadership skills)
3. Qualifications (degrees, certifications, years of experience, licenses)
4. Industry Terms (domain-specific jargon, methodologies, standards)
5. Action Verbs (powerful verbs the job uses that candidates should mirror)
6. Job-Specific Keywords (role-specific duties, responsibilities, must-haves)

Also identify the TOP 10 highest-priority keywords across all categories — those that appear most frequently or are most central to the role.

Return ONLY a JSON object in this exact format, no markdown, no explanation:
{
  "top": ["keyword1", "keyword2", ...],
  "categories": [
    { "name": "Technical Skills", "keywords": ["Python", "AWS", ...] },
    { "name": "Soft Skills", "keywords": [...] },
    { "name": "Qualifications", "keywords": [...] },
    { "name": "Industry Terms", "keywords": [...] },
    { "name": "Action Verbs", "keywords": [...] },
    { "name": "Job-Specific Keywords", "keywords": [...] }
  ],
  "total": 45
}

Job Description:
${jd}`;

  try {
    const response = await fetch("https://ats-proxy.vishnubenoit.workers.dev/", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        messages: [{ role: "user", content: prompt }]
      })
    });

    if (!response.ok) throw new Error(`API error: ${response.status}`);

    const data = await response.json();
    const text = data.content.map(b => b.text || '').join('');
    const clean = text.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);

    lastResult = parsed;
    renderResults(parsed);
  } catch (e) {
    showError('Failed to extract keywords. ' + (e.message || 'Please try again.'));
  } finally {
    setLoading(false);
  }
}

function renderResults(data) {
  const total = data.total || data.categories.reduce((s, c) => s + c.keywords.length, 0);
  document.getElementById('results-meta').textContent = total + ' keywords found';

  // Top keywords
  const topEl = document.getElementById('top-keywords');
  topEl.innerHTML = (data.top || []).map(k =>
    `<span class="top-chip">${k}</span>`
  ).join('');

  // Categories
  const catEl = document.getElementById('categories');
  catEl.innerHTML = data.categories.map((cat, i) => {
    const ci = i % 6;
    if (!cat.keywords || cat.keywords.length === 0) return '';
    return `
      <div class="category-block">
        <div class="category-header">
          <div class="category-dot c${ci}-dot"></div>
          <div class="category-name">${cat.name}</div>
          <span class="category-count">${cat.keywords.length}</span>
        </div>
        <div class="keyword-list">
          ${cat.keywords.map(k => `<span class="keyword-chip c${ci}">${k}</span>`).join('')}
        </div>
      </div>
    `;
  }).join('');

  document.getElementById('results').style.display = 'block';
}

function copyAll() {
  if (!lastResult) return;
  const all = lastResult.categories.flatMap(c => c.keywords).join(', ');
  navigator.clipboard.writeText(all).then(() => flashCopy('Copied all!'));
}

function copyTop() {
  if (!lastResult) return;
  navigator.clipboard.writeText((lastResult.top || []).join(', ')).then(() => flashCopy('Copied top!'));
}

function flashCopy(msg) {
  const btns = document.querySelectorAll('.btn-copy');
  btns.forEach(b => { b.textContent = msg; setTimeout(() => { b.textContent = b.textContent.includes('All') ? 'Copy All Keywords' : 'Copy Top Keywords'; }, 1500); });
}

function clearAll() {
  textarea.value = '';
  document.getElementById('char-count').textContent = '0 chars';
  document.getElementById('results').style.display = 'none';
  hideError();
  lastResult = null;
}

function setLoading(on) {
  document.getElementById('loading').style.display = on ? 'block' : 'none';
  document.getElementById('extract-btn').disabled = on;
  document.getElementById('extract-btn').textContent = on ? 'Analyzing…' : 'Extract Keywords';
}

function showError(msg) {
  const el = document.getElementById('error');
  el.textContent = msg;
  el.style.display = 'block';
}

function hideError() {
  document.getElementById('error').style.display = 'none';
}
</script>
</body>
</html>
